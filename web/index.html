<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- No `viewport-fit=cover`: we deliberately let iOS inset the web view to the
         safe area and paint the notch / home-indicator strips itself (with
         `theme-color`), instead of going full-bleed and owning those pixels. That
         avoids the fragile safe-area height math that stranded a gap below the
         footer. With no `cover`, every `env(safe-area-inset-*)` resolves to 0. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>Bridge</title>
    <meta name="description" content="Drive Claude Code on a VPS." />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Match the header/footer chrome (--bg-1), not the body, so the iOS-painted
         notch and home-indicator strips blend into the top bar and bottom tabs. -->
    <meta name="theme-color" content="#121212" />
    <meta name="color-scheme" content="dark" />

    <!-- iOS PWA. No `apple-mobile-web-app-status-bar-style`: in the non-cover model
         above, iOS keeps the web view inside the safe area and tints the status bar
         from `theme-color`, so there's no iOS-drawn bar to fight and nothing to
         strand at the bottom. (Setting a style here re-opts into owning the notch.) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Bridge" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
