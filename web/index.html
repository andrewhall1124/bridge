<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0"
    />
    <title>Bridge</title>
    <meta name="description" content="Drive Claude Code on a VPS." />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <meta name="theme-color" content="#0a0a0a" />
    <meta name="color-scheme" content="dark" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- `black-translucent`: the web view goes full-bleed under the status bar,
         so the `.topbar` (which reserves `--safe-top` and paints `--bg-1`) fills
         the notch with the header grey instead of leaving an iOS-drawn black bar.
         The historical downside — a stranded gap below the footer, because the
         viewport was a status-bar shorter than the screen — is handled now that
         `.app` is `position: fixed; inset: 0` (see styles.css) rather than
         `dvh`-sized, so the shell reaches the real screen bottom regardless. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Bridge" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
